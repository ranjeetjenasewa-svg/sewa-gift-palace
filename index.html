<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sewa Gift Palace - Premium Dashboard</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #fff;
    }

    header {
      padding: 20px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header h1 {
      color: #facc15;
      font-size: 26px;
      letter-spacing: 1px;
    }

    .top-bar {
      display: flex;
      gap: 10px;
      padding: 15px;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    input {
      flex:1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #1e293b;
      color: white;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #22c55e;
      color: black;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 15px;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.6);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #38bdf8;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      flex:1 1 45%;
      padding: 10px;
      border-radius: 10px;
      text-align:center;
      text-decoration:none;
      color:white;
      font-size:14px;
      transition:0.2s;
    }

    .btn:hover { transform: scale(1.05); }

    .blue { background:#2563eb; }
    .green { background:#16a34a; }
    .purple { background:#7c3aed; }
    .orange { background:#f97316; }

    .stats {
      display:flex;
      gap:10px;
      padding: 0 15px;
      flex-wrap: wrap;
    }

    .stat-box {
      flex:1;
      background:#020617;
      padding:10px;
      border-radius:10px;
      text-align:center;
      border:1px solid rgba(255,255,255,0.1);
    }

    @media(max-width:600px){
      header h1{ font-size:18px; }
    }
  </style>
</head>

<body>

<header>
  <h1>🚀 SEWA GIFT PALACE</h1>
</header>

<div class="top-bar">
  <input type="text" id="search" placeholder="Search process...">
  <button onclick="addCard()">+ Add</button>
</div>

<div class="stats">
  <div class="stat-box">Total Cards: <span id="total">0</span></div>
</div>

<div class="container" id="dashboard"></div>

<script>

let data = JSON.parse(localStorage.getItem('dashboard')) || [
  {title:'IMS'},
  {title:'Stock Taking'},
  {title:'Sales Report'}
];

function render(){
  let html='';
  data.forEach((item,i)=>{
    html += `
    <div class="card">
      <h3>${item.title}</h3>
      <div class="buttons">
        <a href="#" class="btn blue">FMS</a>
        <a href="#" class="btn purple">PMS</a>
        <a href="#" class="btn green">Checklist</a>
        <a href="#" class="btn orange">Form</a>
      </div>
    </div>`;
  });

  document.getElementById('dashboard').innerHTML = html;
  document.getElementById('total').innerText = data.length;

  localStorage.setItem('dashboard', JSON.stringify(data));
}

function addCard(){
  let name = prompt('Enter process name');
  if(name){
    data.push({title:name});
    render();
  }
}

// SEARCH

document.getElementById('search').addEventListener('input', function(){
  let val = this.value.toLowerCase();
  let cards = document.querySelectorAll('.card');

  cards.forEach(card=>{
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(val) ? 'block' : 'none';
  });
});

render();

</script>

</body>
</html>
